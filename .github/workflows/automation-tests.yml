name: Customs Portal Automation Suite

# ============================================================
# Triggers: push to main/master
# Runner:   GitHub-hosted Ubuntu
# Browser:  Chrome headless
# Suite:    src/TestRunner/Groups.xml
# ============================================================

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  MAVEN_OPTS: "-Xmx1024m"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"
  SUITE_FILE: "src/TestRunner/Groups.xml"

jobs:

  # ==========================================================
  # JOB 1 - BUILD
  # ==========================================================
  compile:
    name: Compile Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile project
        run: |
          echo "Compiling the project..."
          mvn $MAVEN_CLI_OPTS compile -DskipTests


  # ==========================================================
  # JOB 2 - AUTOMATION TESTS
  # ==========================================================
  run-tests:
    name: Run Selenium Tests
    runs-on: ubuntu-latest
    needs:
      - compile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Display environment versions
        run: |
          echo "Java version:"
          java -version

          echo "Maven version:"
          mvn -version

          echo "Chrome version:"
          google-chrome --version || google-chrome-stable --version

          echo "ChromeDriver version:"
          if command -v chromedriver >/dev/null 2>&1; then
            chromedriver --version
          else
            echo "ChromeDriver is not on PATH. Selenium Manager will be used."
          fi

      - name: Run TestNG automation suite
        run: |
          echo "Running TestNG suite: $SUITE_FILE"

          DRIVER_ARGUMENT=""

          if command -v chromedriver >/dev/null 2>&1; then
            DRIVER_ARGUMENT="-Dwebdriver.chrome.driver=$(command -v chromedriver)"
          fi

          mvn $MAVEN_CLI_OPTS test \
            -DsuiteXmlFile="$SUITE_FILE" \
            -Dheadless=true \
            $DRIVER_ARGUMENT

      - name: Upload automation test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-test-results
          path: |
            test-output/
            target/surefire-reports/
            allure-results/
            target/allure-results/
          if-no-files-found: warn
          retention-days: 7


  # ==========================================================
  # JOB 3 - ALLURE REPORT
  # ==========================================================
  generate-allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs:
      - run-tests

    # Run the report job even when tests fail
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: automation-test-results
          path: .

      - name: Generate Allure HTML report
        run: |
          echo "Generating Allure report..."

          mvn $MAVEN_CLI_OPTS allure:report

          # Normalize the generated report directory
          if [ -d "allure-report" ]; then
            echo "Allure report already exists at allure-report/"
          elif [ -d "target/site/allure-maven-plugin" ]; then
            cp -R target/site/allure-maven-plugin allure-report
          elif [ -d "target/site/allure-report" ]; then
            cp -R target/site/allure-report allure-report
          else
            echo "Allure HTML report directory was not found."
            find target -maxdepth 4 -type d 2>/dev/null || true
            exit 1
          fi

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: allure-report/
          if-no-files-found: warn
          retention-days: 30
